name: lgu_mobile
description: Ormoc City LGU Mobile Portal

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^0.4.0
  shared_preferences: ^2.5.5
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  intl: ^0.19.0
  path: ^1.9.0
  mobile_scanner: ^5.2.3
  provider: ^6.1.5+1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "lib/assets/images/EM.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/assets/images/EM.png"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/images/
