name: lgu_mobile
description: Ormoc City LGU Government Mobile Portal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP + storage
  http: ^1.2.1
  sqflite: ^2.3.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  intl: ^0.19.0

  # ── QR code scanning ──────────────────────────────────────────────
  # Uses the device camera; wraps ML Kit / ZXing under the hood.
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true